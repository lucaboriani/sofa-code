description: Hogarth's serpentine S-curve, drawn in 1753, morphs forever through independent sinusoids and trails of itself. Drag to rotate it and sweep the filter; the construction grid behind it is a six-string harp tuned to golden-ratio intervals — brush or pluck the axes to sound them.
