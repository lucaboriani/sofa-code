<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catfish</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; background: transparent; }
  #audio-btn { position: fixed; z-index: 10; pointer-events: all; }
  #audio-btn {
    position: fixed;
    bottom: 22px;
    right: 24px;
    background: rgba(100,100,100,0.18);
    border: 1px solid rgba(160,160,160,0.35);
    color: rgba(180,180,180,0.85);
    font-family: system-ui, sans-serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    backdrop-filter: blur(6px);
    transition: background 0.2s, color 0.2s;
    z-index: 10;
  }
  #audio-btn:hover { background: rgba(120,120,120,0.30); color: rgba(220,220,220,1); }
  #audio-btn.on { border-color: rgba(140,210,255,0.5); color: rgba(160,230,255,0.9); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="audio-btn">♪ audio off</button>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: true });

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; buildGrid(); }
window.addEventListener('resize', resize);

// ── Input ─────────────────────────────────────────────────────────────────────
const mouse = { x: null, y: null, down: false };
function setPos(x, y) { mouse.x = x; mouse.y = y; }
canvas.addEventListener('mousemove',  e => setPos(e.clientX, e.clientY));
canvas.addEventListener('mousedown',  e => { mouse.down=true; setPos(e.clientX, e.clientY); });
canvas.addEventListener('mouseup',    () => { mouse.down=false; });
canvas.addEventListener('mouseleave', () => { mouse.down=false; });
canvas.addEventListener('touchstart', e => { mouse.down=true; setPos(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchmove',  e => { mouse.down=true; setPos(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchend',   e => {
  mouse.down = false;
  if (e.changedTouches.length) shockNearest(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
});
canvas.addEventListener('click', e => shockNearest(e.clientX, e.clientY));

// ── Audio ─────────────────────────────────────────────────────────────────────
let audioCtx = null;
let audioOn = false;

function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playShock() {
  if (!audioOn) return;
  const ac = getAC();
  const len = ac.sampleRate * 0.18;
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random()*2-1;
  const src = ac.createBufferSource(); src.buffer = buf;
  const bp = ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=3200; bp.Q.value=0.6;
  const g = ac.createGain();
  g.gain.setValueAtTime(0.8, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.18);
  src.connect(bp); bp.connect(g); g.connect(ac.destination);
  src.start(); src.stop(ac.currentTime+0.18);
}
function playCollision() {
  if (!audioOn) return;
  const ac = getAC();
  const len2 = ac.sampleRate * 0.04;
  const buf2 = ac.createBuffer(1, len2, ac.sampleRate);
  const d2 = buf2.getChannelData(0);
  for (let i = 0; i < len2; i++) d2[i] = Math.random()*2-1;
  const src2 = ac.createBufferSource(); src2.buffer = buf2;
  const hp = ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=6000;
  const g2 = ac.createGain();
  g2.gain.setValueAtTime(0.022, ac.currentTime);
  g2.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+0.04);
  src2.connect(hp); hp.connect(g2); g2.connect(ac.destination);
  src2.start(); src2.stop(ac.currentTime+0.04);
}

// ── Ambient bubbles ───────────────────────────────────────────────────────────
let drone = null;
function initDrone() {
  if (drone) return;
  const ac = getAC();
  const master = ac.createGain(); master.gain.value = 0.0;
  master.connect(ac.destination);

  // Low soft underwater rumble — very quiet bed
  const bed = ac.createOscillator(); bed.type = 'sine'; bed.frequency.value = 48;
  const bedG = ac.createGain(); bedG.gain.value = 0.06;
  bed.connect(bedG); bedG.connect(master); bed.start();

  // LFO wobble on bed
  const lfo = ac.createOscillator(); lfo.frequency.value = 0.12;
  const lfoG = ac.createGain(); lfoG.gain.value = 6;
  lfo.connect(lfoG); lfoG.connect(bed.frequency); lfo.start();

  drone = { ac, master, nextBubble: 0, rate: 1.2, nextShimmer: 0, etherMaster: null };

  // ── Ethereal shimmer layer ──────────────────────────────────────────────────
  const etherMaster = ac.createGain(); etherMaster.gain.value = 0.0;
  etherMaster.connect(ac.destination);

  // Reverb-like ping-pong delay
  const dL = ac.createDelay(2); dL.delayTime.value = 0.52;
  const dR = ac.createDelay(2); dR.delayTime.value = 0.78;
  const fbL = ac.createGain(); fbL.gain.value = 0.42;
  const fbR = ac.createGain(); fbR.gain.value = 0.38;
  dL.connect(fbL); fbL.connect(dR);
  dR.connect(fbR); fbR.connect(dL);
  dL.connect(etherMaster); dR.connect(etherMaster);

  // Three high sine partials, slightly detuned — glass harmonic feeling
  const etherFreqs = [523.25, 659.26, 783.99]; // C5, E5, G5
  const etherOscs = [];
  // Lowpass filter on ether — mouse Y controls cutoff
  const etherFilter = ac.createBiquadFilter();
  etherFilter.type = 'lowpass'; etherFilter.frequency.value = 2000; etherFilter.Q.value = 1.2;
  etherFilter.connect(etherMaster);

  for (let i = 0; i < etherFreqs.length; i++) {
    const o = ac.createOscillator(); o.type = 'sine';
    o.frequency.value = etherFreqs[i] + (Math.random()-0.5)*1.5;
    const g = ac.createGain(); g.gain.value = 0;
    const trem = ac.createOscillator(); trem.frequency.value = 0.07 + i*0.04;
    const tremG = ac.createGain(); tremG.gain.value = 0.018;
    trem.connect(tremG); tremG.connect(g.gain);
    trem.start();
    o.connect(g); g.connect(dL); g.connect(etherFilter);
    o.start();
    etherOscs.push({ osc: o, gain: g, base: etherFreqs[i] });
  }

  drone.etherMaster = etherMaster;
  drone.etherFilter  = etherFilter;
  drone.etherOscs   = etherOscs;
  drone.dL = dL; drone.dR = dR;
}

function scheduleBubble(ac, master, freq, vol) {
  // Single bubble: sine that rises quickly and pops — very short
  const now = ac.currentTime;
  const dur  = 0.06 + Math.random() * 0.08;
  const o = ac.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(freq, now);
  o.frequency.linearRampToValueAtTime(freq * (1.6 + Math.random()), now + dur);
  const g = ac.createGain();
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(vol, now + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  o.connect(g); g.connect(master);
  o.start(now); o.stop(now + dur + 0.01);
}

function updateDrone(now_ts) {
  if (!audioOn || !drone || !fishes.length) return;
  const ac = drone.ac;
  const now = ac.currentTime;

  // Dispersion drives master volume and bubble rate
  let totalDist = 0;
  for (const f of fishes) totalDist += Math.hypot(f.x-f.hx, f.y-f.hy);
  const dispersion = Math.min(totalDist / fishes.length / 180, 1);

  // Mouse position → normalised 0..1
  const mx = mouse.x !== null ? mouse.x / canvas.width  : 0.5; // X: 0=left 1=right
  const my = mouse.y !== null ? mouse.y / canvas.height : 0.5; // Y: 0=top  1=bottom

  // Fade master volume in/out
  drone.master.gain.setTargetAtTime(0.05 + dispersion * 0.12, now, 0.8);

  // ── Ethereal layer ──────────────────────────────────────────────────────────
  if (drone.etherMaster) {
    // Mouse Y → filter cutoff: top=airy high, bottom=dark low
    const cutoff = 400 + (1 - my) * 3600; // 400–4000 Hz
    drone.etherFilter.frequency.setTargetAtTime(cutoff, now, 0.4);

    // Mouse X → detune / chorus width
    const chorus = (mx - 0.5) * 6; // ±3 Hz offset
    drone.etherOscs.forEach((e, i) => {
      const drift = 1 + dispersion * 0.015 * (i % 2 === 0 ? 1 : -1);
      const sign  = i === 1 ? -1 : 1;
      e.osc.frequency.setTargetAtTime(e.base * drift + chorus * sign, now, 0.6);
      e.gain.gain.setTargetAtTime(0.05 + dispersion * 0.025, now, 2.0);
    });

    // Mouse Y also swells ether volume slightly
    const etherVol = 0.004 + (1 - my) * 0.008 + dispersion * 0.004;
    drone.etherMaster.gain.setTargetAtTime(etherVol, now, 2.0);
  }

  // ── Bubbles ──────────────────────────────────────────────────────────────────
  // Mouse X → bubble pitch range: left=low, right=high
  const bubbleLo = 180 + mx * 220;   // 180–400
  const bubbleHi = 400 + mx * 700;   // 400–1100

  drone.rate = 0.5 + dispersion * 3.5;

  if (now_ts > drone.nextBubble) {
    const interval = 1000 / drone.rate;
    drone.nextBubble = now_ts + interval * (0.6 + Math.random() * 0.8);
    const freq = bubbleLo + Math.random() * (bubbleHi - bubbleLo);
    const vol  = 0.03 + Math.random() * 0.05;
    scheduleBubble(ac, drone.master, freq, vol);
    if (Math.random() < 0.25) {
      setTimeout(() => {
        if (audioOn && drone) scheduleBubble(ac, drone.master, freq * (1 + Math.random()*0.2), vol * 0.6);
      }, 40 + Math.random() * 60);
    }
  }
}

// ── Audio button ──────────────────────────────────────────────────────────────
const audioBtn = document.getElementById('audio-btn');
audioBtn.addEventListener('click', () => {
  audioOn = !audioOn;
  if (audioOn) {
    initDrone();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    audioBtn.textContent = '♪ audio on';
    audioBtn.classList.add('on');
  } else {
    if (audioCtx) audioCtx.suspend();
    audioBtn.textContent = '♪ audio off';
    audioBtn.classList.remove('on');
  }
});
const SEGS = 50, HALF_L = 280;
const WIDTHS = [];
for (let i = 0; i <= SEGS; i++) {
  const p = i/SEGS;
  WIDTHS[i] = 22 * Math.pow(Math.sin(Math.pow(p,0.55)*Math.PI),1.1) * (1-0.15*p);
}
const BASE = '#6a6a6a';
const FISH_S = 0.055;
const COLS = 9, ROWS = 5;
let fishes = [];

function shade(hex, amt) {
  const n = parseInt(hex.slice(1),16);
  const c = v => Math.min(255,Math.max(0,v+amt));
  return `rgb(${c((n>>16)&255)},${c((n>>8)&255)},${c(n&255)})`;
}
function smoothPath(pts) {
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length-1; i++)
    ctx.quadraticCurveTo(pts[i].x, pts[i].y, (pts[i].x+pts[i+1].x)/2, (pts[i].y+pts[i+1].y)/2);
  ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
}

function buildGrid() {
  const gapX=72, gapY=58;
  const ox=canvas.width/2-(COLS-1)*gapX/2, oy=canvas.height/2-(ROWS-1)*gapY/2;
  const prev = fishes.slice(); fishes=[];
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const hx=ox+c*gapX, hy=oy+r*gapY, old=prev[r*COLS+c];
      fishes.push({ hx, hy, x:old?old.x:hx, y:old?old.y:hy,
        angle:-Math.PI/2, phase:Math.random()*Math.PI*2,
        amp:0.022, speed:0, shockT:null,
        maxSpeed: 55 + Math.random() * 75 }); // 55–130 px/s each fish
    }
  }
}

function shockNearest(px, py) {
  let best=null, bestD=Infinity;
  const hr = FISH_S*HALF_L*0.7;
  for (const f of fishes) {
    const d=Math.hypot(f.x-px, f.y-py);
    if (d<bestD) { bestD=d; best=f; }
  }
  if (best && bestD<hr) { best.shockT=performance.now(); playShock(); }
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function drawFish(f, now) {
  ctx.save();
  ctx.translate(f.x, f.y);
  ctx.rotate(f.angle);
  ctx.scale(FISH_S, FISH_S);

  // build spine
  const spine=[], normals=[];
  for (let i=0; i<=SEGS; i++) {
    const p=i/SEGS;
    spine[i]={ x:HALF_L-p*2*HALF_L, y:f.amp*Math.pow(p,1.6)*Math.sin(f.phase-p*1.8*Math.PI)*HALF_L };
  }
  for (let i=0; i<=SEGS; i++) {
    const pv=spine[Math.max(i-1,0)], nx2=spine[Math.min(i+1,SEGS)];
    const tx=nx2.x-pv.x, ty=nx2.y-pv.y, tl=Math.sqrt(tx*tx+ty*ty)||1;
    normals[i]={nx:-ty/tl, ny:tx/tl};
  }
  const upper=spine.map((s,i)=>({x:s.x+normals[i].nx*WIDTHS[i], y:s.y+normals[i].ny*WIDTHS[i]}));
  const lower=spine.map((s,i)=>({x:s.x-normals[i].nx*WIDTHS[i], y:s.y-normals[i].ny*WIDTHS[i]}));

  function bodyPath() {
    ctx.beginPath(); smoothPath(upper);
    ctx.lineTo(spine[SEGS].x, spine[SEGS].y);
    smoothPath([...lower].reverse()); ctx.closePath();
  }

  // pectorals
  const pi2=Math.round(0.18*SEGS), sh=spine[pi2], sn=normals[pi2];
  const stx=spine[pi2+1].x-spine[pi2-1].x, sty=spine[pi2+1].y-spine[pi2-1].y;
  const stl=Math.sqrt(stx*stx+sty*sty)||1, bkX=stx/stl, bkY=sty/stl;
  for (const s of [-1,1]) {
    const bx=sh.x+s*sn.nx*WIDTHS[pi2], by=sh.y+s*sn.ny*WIDTHS[pi2];
    ctx.beginPath(); ctx.moveTo(bx,by);
    ctx.bezierCurveTo(bx+s*sn.nx*24+bkX*10,by+s*sn.ny*24+bkY*10,bx+s*sn.nx*52+bkX*38,by+s*sn.ny*52+bkY*38,bx+s*sn.nx*48+bkX*62,by+s*sn.ny*48+bkY*62);
    ctx.bezierCurveTo(bx+s*sn.nx*36+bkX*52,by+s*sn.ny*36+bkY*52,bx+s*sn.nx*14+bkX*22,by+s*sn.ny*14+bkY*22,bx,by);
    ctx.fillStyle=shade(BASE,-18); ctx.fill();
  }
  // body
  bodyPath(); ctx.fillStyle=BASE; ctx.fill();
  // dorsal
  {
    const ds=Math.round(0.10*SEGS), de=Math.round(0.52*SEGS);
    ctx.beginPath();
    for (let i=ds;i<=de;i++) { const b=Math.sin((i-ds)/(de-ds)*Math.PI)*7; i===ds?ctx.moveTo(spine[i].x+normals[i].nx*b,spine[i].y+normals[i].ny*b):ctx.lineTo(spine[i].x+normals[i].nx*b,spine[i].y+normals[i].ny*b); }
    for (let i=de;i>=ds;i--) { const b=Math.sin((i-ds)/(de-ds)*Math.PI)*1.5; ctx.lineTo(spine[i].x+normals[i].nx*b,spine[i].y+normals[i].ny*b); }
    ctx.closePath(); ctx.fillStyle=shade(BASE,-20); ctx.fill();
  }
  // adipose
  {
    const ai=Math.round(0.62*SEGS);
    ctx.beginPath(); ctx.ellipse(spine[ai].x+normals[ai].nx*5,spine[ai].y+normals[ai].ny*5,9,3.5,0,0,Math.PI*2);
    ctx.fillStyle=shade(BASE,-20); ctx.fill();
  }
  // tail
  {
    const t=spine[SEGS], n=normals[SEGS], pv=spine[SEGS-1];
    const tdx=t.x-pv.x, tdy=t.y-pv.y, tl=Math.sqrt(tdx*tdx+tdy*tdy)||1, dx=tdx/tl, dy=tdy/tl;
    for (const s of [-1,1]) {
      ctx.beginPath(); ctx.moveTo(t.x,t.y);
      ctx.bezierCurveTo(t.x+dx*18+s*n.nx*10,t.y+dy*18+s*n.ny*10,t.x+dx*38+s*n.nx*34,t.y+dy*38+s*n.ny*34,t.x+dx*30+s*n.nx*48,t.y+dy*30+s*n.ny*48);
      ctx.bezierCurveTo(t.x+dx*20+s*n.nx*36,t.y+dy*20+s*n.ny*36,t.x+dx*10+s*n.nx*14,t.y+dy*10+s*n.ny*14,t.x,t.y);
      ctx.fillStyle=shade(BASE,-22); ctx.fill();
    }
  }
  // eyes
  {
    const ei=Math.round(0.06*SEGS);
    for (const s of [-1,1]) {
      const ex=spine[ei].x+s*normals[ei].nx*12, ey=spine[ei].y+s*normals[ei].ny*12;
      ctx.beginPath(); ctx.ellipse(ex,ey,5,4,0,0,Math.PI*2); ctx.fillStyle=shade(BASE,-42); ctx.fill();
      ctx.beginPath(); ctx.ellipse(ex,ey,2.5,2.5,0,0,Math.PI*2); ctx.fillStyle=shade(BASE,-75); ctx.fill();
    }
  }
  // barbels
  {
    const hn=normals[0];
    const fdx=spine[1].x-spine[0].x, fdy=spine[1].y-spine[0].y, fl=Math.sqrt(fdx*fdx+fdy*fdy)||1;
    const fwdX=fdx/fl, fwdY=fdy/fl, tipX=upper[0].x, tipY=upper[0].y;
    const dr=Math.sin(f.phase*0.85)*5, dr2=Math.sin(f.phase*0.65+0.8)*3.5;
    const bb=[[-8,0,-20,18,-40,50,-34+dr,82,.65],[8,0,20,18,40,50,34-dr,82,.65],
              [-4,0,-10,18,-20,46,-14+dr2,66,.50],[4,0,10,18,20,46,14-dr2,66,.50],
              [-12,0,-24,6,-36,12,-38+dr*.5,18,.45],[12,0,24,6,36,12,38-dr*.5,18,.45],
              [-6,0,-13,5,-20,10,-22+dr*.3,15,.40],[6,0,13,5,20,10,22-dr*.3,15,.40]];
    ctx.lineCap='round';
    for (const [pO,fO,c1P,c1F,c2P,c2F,tP,tF,lw] of bb) {
      ctx.beginPath();
      ctx.moveTo(tipX+hn.nx*pO+fwdX*fO, tipY+hn.ny*pO+fwdY*fO);
      ctx.bezierCurveTo(tipX+hn.nx*c1P+fwdX*c1F,tipY+hn.ny*c1P+fwdY*c1F,
                        tipX+hn.nx*c2P+fwdX*c2F,tipY+hn.ny*c2P+fwdY*c2F,
                        tipX+hn.nx*tP+fwdX*tF,  tipY+hn.ny*tP+fwdY*tF);
      ctx.strokeStyle=shade(BASE,-10); ctx.lineWidth=lw; ctx.stroke();
    }
  }

  // ── shock ──────────────────────────────────────────────────────────────────
  if (f.shockT) {
    const shock = Math.max(0, Math.exp(-((now - f.shockT)/1000)*6));
    if (shock > 0.01) {
      // body flash
      bodyPath();
      ctx.globalAlpha=shock*0.5; ctx.fillStyle='#aaeeff'; ctx.fill(); ctx.globalAlpha=1;
      // lightning
      const seed = Math.floor(now/40);
      const rng = (a,b) => Math.abs(Math.sin(a*127.3+b*311.7+seed*73.1));
      for (let stroke=0; stroke<3; stroke++) {
        ctx.beginPath(); ctx.moveTo(spine[0].x, spine[0].y);
        for (let i=1; i<=SEGS; i++) {
          const j=(rng(i,stroke)*2-1)*WIDTHS[i]*shock*1.2;
          const px=spine[i].x+normals[i].nx*j, py=spine[i].y+normals[i].ny*j;
          rng(i+50,stroke)>0.18 ? ctx.lineTo(px,py) : ctx.moveTo(px,py);
        }
        ctx.globalAlpha=shock*(stroke===0?0.95:0.45);
        ctx.strokeStyle=stroke===0?'#ddf8ff':'#66ccff';
        ctx.lineWidth=stroke===0?2:0.8; ctx.lineCap='round'; ctx.stroke();
      }
      // sparks
      for (let k=0; k<Math.floor(shock*14); k++) {
        const t2=rng(k,seed+1), si2=Math.floor(t2*SEGS);
        const side=(rng(k+200,seed)*2-1)*WIDTHS[si2]*0.85;
        const gx=spine[si2].x+normals[si2].nx*side, gy=spine[si2].y+normals[si2].ny*side;
        const gr=ctx.createRadialGradient(gx,gy,0,gx,gy,7);
        gr.addColorStop(0,'rgba(255,255,255,0.98)');
        gr.addColorStop(0.3,'rgba(180,230,255,0.7)');
        gr.addColorStop(1,'rgba(80,180,255,0)');
        ctx.beginPath(); ctx.arc(gx,gy,7,0,Math.PI*2);
        ctx.globalAlpha=shock; ctx.fillStyle=gr; ctx.fill();
      }
      ctx.globalAlpha=1;
    } else {
      f.shockT=null;
    }
  }

  ctx.restore();
}

// ── Update ────────────────────────────────────────────────────────────────────
function updateFish(f, dt) {
  const targetX = (mouse.down && mouse.x!==null) ? mouse.x : f.hx;
  const targetY = (mouse.down && mouse.y!==null) ? mouse.y : f.hy;
  const dx=targetX-f.x, dy=targetY-f.y, dist=Math.hypot(dx,dy);

  if (mouse.down && dist>1) {
    // face and swim toward mouse
    let delta=Math.atan2(dy,dx)-f.angle;
    while(delta> Math.PI) delta-=Math.PI*2;
    while(delta<-Math.PI) delta+=Math.PI*2;
    f.angle += delta*Math.min(dt*4.5,1);
  } else if (!mouse.down) {
    if (dist>3) {
      // face home and swim back
      let delta=Math.atan2(dy,dx)-f.angle;
      while(delta> Math.PI) delta-=Math.PI*2;
      while(delta<-Math.PI) delta+=Math.PI*2;
      f.angle += delta*Math.min(dt*3.5,1);
    } else {
      // at home: ease back to north
      let delta=-Math.PI/2-f.angle;
      while(delta> Math.PI) delta-=Math.PI*2;
      while(delta<-Math.PI) delta+=Math.PI*2;
      f.angle += delta*dt*2.0;
    }
  }

  const targetSpd = dist>2 ? Math.min(dist*2, mouse.down ? f.maxSpeed : f.maxSpeed*0.72) : 0;
  f.speed += (targetSpd-f.speed)*dt*2.5;
  const step=Math.min(f.speed*dt, dist);
  if (step>0) { f.x+=Math.cos(f.angle)*step; f.y+=Math.sin(f.angle)*step; }

  const sr = Math.min(f.speed / f.maxSpeed, 1);
  f.amp   = 0.12 + sr * 0.18;
  f.phase += dt * (1.4 + sr * 2.8);
}

// ── Collision ─────────────────────────────────────────────────────────────────
const COLL_R = FISH_S*HALF_L*0.55;
const lastColl = new Map();
function checkCollisions() {
  for (let i=0; i<fishes.length; i++) {
    for (let j=i+1; j<fishes.length; j++) {
      const a=fishes[i], b=fishes[j];
      const d=Math.hypot(a.x-b.x, a.y-b.y);
      if (d < COLL_R*1.4) {
        const key=`${i}-${j}`, last=lastColl.get(key)||0;
        if (performance.now()-last > 600) {
          lastColl.set(key, performance.now());
          playCollision();
          a.shockT = performance.now();
          b.shockT = performance.now();
          const nx=(a.x-b.x)/d||1, ny=(a.y-b.y)/d||1;
          a.x+=nx*3; a.y+=ny*3; b.x-=nx*3; b.y-=ny*3;
        }
      }
    }
  }
}

// ── Loop ──────────────────────────────────────────────────────────────────────
let lastT=0;
function frame(ts) {
  const dt=Math.min((ts-lastT)/1000, 0.05); lastT=ts;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for (const f of fishes) { updateFish(f,dt); drawFish(f,ts); }
  checkCollisions();
  updateDrone(ts);
  requestAnimationFrame(frame);
}

resize();
requestAnimationFrame(frame);
</script>
</body>
