<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TUNNEL</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; cursor:none; }
  canvas { display:block; position:fixed; top:0; left:0; width:100vw; height:100vh; }
  #hint {
    position:fixed; bottom:1.4rem; left:50%; transform:translateX(-50%);
    color:rgba(255,255,255,0.22); font:11px/1 'Courier New',monospace;
    letter-spacing:.15em; text-transform:uppercase; pointer-events:none;
    transition:opacity 1.5s;
  }
  #start {
    position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:1.2rem;
    background:#000; z-index:10; cursor:pointer;
  }
  #start span { font:13px/1 'Courier New',monospace; letter-spacing:.25em; text-transform:uppercase; color:rgba(255,255,255,0.5); }
  #start span.big { font-size:15px; color:rgba(255,255,255,0.85); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">drag up/down to control speed</div>
<div id="start">
  <span class="big">&#9654; enter tunnel</span>
  <span>click or tap to begin</span>
</div>
<script>
"use strict";

// ── WebGL ─────────────────────────────────────────────────────────────────────
var canvas  = document.getElementById('c');
var hint    = document.getElementById('hint');
var startEl = document.getElementById('start');
var gl = canvas.getContext('webgl2', { antialias:false, alpha:false, depth:false });
if (!gl) { document.body.innerHTML = '<p style="color:#fff;padding:2rem">WebGL2 not supported.</p>'; }

var RW, RH, pixelBuf;
function resize() {
  RW = canvas.width  = window.innerWidth;
  RH = canvas.height = window.innerHeight;
  gl.viewport(0, 0, RW, RH);
  // Sample 3 rows in the floor region — more rows = better curve coverage estimate
  pixelBuf = new Uint8Array(RW * 6 * 4); // 3 floor rows + 3 ceiling rows
}
resize();
window.addEventListener('resize', resize);

// ── drag speed ────────────────────────────────────────────────────────────────
var speed = 3.5;
var dragActive = false;
var dragY0 = 0;

canvas.addEventListener('mousedown', function(e) { dragActive = true; dragY0 = e.clientY; hint.style.opacity = '0'; });
window.addEventListener('mousemove', function(e) {
  if (!dragActive) return;
  speed -= (e.clientY - dragY0) * 0.03;
  speed = Math.max(-12, Math.min(18, speed));
  dragY0 = e.clientY;
});
window.addEventListener('mouseup', function() { dragActive = false; });
canvas.addEventListener('touchstart', function(e) { e.preventDefault(); dragActive = true; dragY0 = e.touches[0].clientY; hint.style.opacity = '0'; }, { passive:false });
window.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (!dragActive) return;
  speed -= (e.touches[0].clientY - dragY0) * 0.03;
  speed = Math.max(-12, Math.min(18, speed));
  dragY0 = e.touches[0].clientY;
}, { passive:false });
window.addEventListener('touchend', function() { dragActive = false; });
setTimeout(function() { hint.style.opacity = '0'; }, 5000);

// ── GLSL ──────────────────────────────────────────────────────────────────────
var VS = [
  '#version 300 es',
  'void main() {',
  '  vec2 v[3];',
  '  v[0] = vec2(-1.0,-1.0);',
  '  v[1] = vec2( 3.0,-1.0);',
  '  v[2] = vec2(-1.0, 3.0);',
  '  gl_Position = vec4(v[gl_VertexID], 0.0, 1.0);',
  '}'
].join('\n');

var FS = [
  '#version 300 es',
  'precision highp float;',
  'uniform vec2  uRes;',
  'uniform float uTime;',
  'out vec4 fragColor;',
  'const float HALF_FOV = 0.6283;',
  'const float CORRIDOR = 1.0;',
  'const float TILE     = 1.5;',
  'const float FAR      = 36.0;',

  'float hash21(vec2 p) {',
  '  p = fract(p * vec2(127.1, 311.7));',
  '  p += dot(p, p + 19.19);',
  '  return fract(p.x * p.y);',
  '}',

  'float vnoise(vec2 p) {',
  '  vec2 i=floor(p), f=fract(p), u=f*f*(3.0-2.0*f);',
  '  return mix(mix(hash21(i),hash21(i+vec2(1,0)),u.x),',
  '             mix(hash21(i+vec2(0,1)),hash21(i+vec2(1,1)),u.x),u.y);',
  '}',

  'float fbm(vec2 p) {',
  '  float v=0.0,a=0.5;',
  '  for(int i=0;i<3;i++){v+=a*vnoise(p);p*=2.1;a*=0.5;}',
  '  return v;',
  '}',

  'float fade(float d){float f=clamp(1.0-d/FAR,0.0,1.0);return f*f;}',

  'float surface(float u,float v,bool dark){',
  '  float tu=fract(u/TILE),tv=fract(v/TILE);',
  '  bool lU=tu<0.04||tu>0.96;',
  '  bool lV=tv<0.04||tv>0.96;',
  '  float cu=floor(u/TILE),cv=floor(v/TILE);',
  '  bool alt=mod(cu+cv,2.0)>0.5;',
  '  float noise=fbm(vec2(tu,tv)*6.0+vec2(cu,cv)*31.7);',
  '  float base=(lU||lV)?mix(0.5,0.65,noise*0.4)',
  '                      :mix(alt?0.14:0.05,(alt?0.14:0.05)+0.12,noise*0.35);',
  '  if(dark)base*=0.55;',
  '  return base;',
  '}',

  'float postFX(vec2 fc,vec2 res){',
  '  float scan=(mod(fc.y,2.0)<1.0)?0.82:1.0;',
  '  vec2 d=fc/res-0.5;',
  '  float vig=clamp(1.0-dot(d,d)*2.2,0.0,1.0);',
  '  return scan*vig;',
  '}',

  'void main(){',
  '  float camZ= uTime;',
  '  float camX= sin(uTime*0.089)*0.38;',
  '  float camY= cos(uTime*0.066)*0.28;',
  '  float yaw = sin(uTime*0.054)*0.18;',
  '  float pit = cos(uTime*0.077)*0.07;',
  '  vec2 ndc=(gl_FragCoord.xy/uRes)*2.0-1.0;',
  '  float asp=uRes.x/uRes.y;',
  '  float px=ndc.x*asp*tan(HALF_FOV);',
  '  float py=ndc.y*tan(HALF_FOV);',
  '  float rdx=px*cos(yaw)-sin(yaw);',
  '  float rdz=px*sin(yaw)+cos(yaw);',
  '  float rdy=py+pit;',
  '  rdx/=rdz; rdy/=rdz;',
  '  float tL=(abs(rdx)>1e-5)?(-CORRIDOR-camX)/rdx:FAR; if(tL<=0.0)tL=FAR;',
  '  float tR=(abs(rdx)>1e-5)?( CORRIDOR-camX)/rdx:FAR; if(tR<=0.0)tR=FAR;',
  '  float tT=(abs(rdy)>1e-5)?( CORRIDOR-camY)/rdy:FAR; if(tT<=0.0)tT=FAR;',
  '  float tB=(abs(rdy)>1e-5)?(-CORRIDOR-camY)/rdy:FAR; if(tB<=0.0)tB=FAR;',
  '  float tSide=min(tL,tR),tTB=min(tT,tB);',
  '  float t=min(tSide,tTB);',
  '  bool isSide=tSide<tTB;',
  '  float hitZ=camZ+t;',
  '  float halfH=1.0/(t+1e-5);',
  '  float pitNDC=pit*1.4;',
  '  float wTop=pitNDC+halfH;',
  '  float wBot=pitNDC-halfH;',
  '  float grey;',
  '  if(ndc.y<=wTop&&ndc.y>=wBot){',
  '    float v=(ndc.y-wBot)/(wTop-wBot);',
  '    grey=surface(hitZ,v*TILE*2.0,!isSide)*fade(t);',
  '  } else {',
  '    float rowOff=abs(ndc.y-pitNDC);',
  '    float rowDist=clamp(rowOff>1e-4?1.0/rowOff:FAR,0.0,FAR);',
  '    float wx=camX+rdx*rowDist;',
  '    float wz=camZ+rowDist;',
  '    grey=surface(wx*2.0,wz,false)*fade(rowDist)*0.45;',
  '  }',
  '  grey*=postFX(gl_FragCoord.xy,uRes);',
  '  fragColor=vec4(vec3(grey),1.0);',
  '}'
].join('\n');

// ── compile ───────────────────────────────────────────────────────────────────
function mkShader(type, src) {
  var s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    throw new Error(gl.getShaderInfoLog(s));
  }
  return s;
}
var prog = gl.createProgram();
gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  throw new Error(gl.getProgramInfoLog(prog));
}
gl.useProgram(prog);
var locRes  = gl.getUniformLocation(prog, 'uRes');
var locTime = gl.getUniformLocation(prog, 'uTime');

// ── Audio ─────────────────────────────────────────────────────────────────────
var audioReady = false;
var actx, masterGain, convolver;
var osc1, osc2, osc3, filterNode, reverbGain, dryGain, tremoloLFO, tremoloGain, tremoloCarrier;
var lineOsc1, lineOsc2, lineGain;
var ceilOsc1, ceilOsc2, ceilGain, ceilBP;
var kickOut;
var TILE_JS = 1.5;
var lastTileIdx = 0;
var kickCount = 0;

function initAudio() {
  if (audioReady) return;
  audioReady = true;
  actx = new (window.AudioContext || window.webkitAudioContext)();

  // reverb IR
  var irLen = Math.floor(actx.sampleRate * 2.8);
  var irBuf = actx.createBuffer(2, irLen, actx.sampleRate);
  for (var ch = 0; ch < 2; ch++) {
    var d = irBuf.getChannelData(ch);
    for (var i = 0; i < irLen; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / irLen, 2.4);
    }
  }
  convolver = actx.createConvolver();
  convolver.buffer = irBuf;

  // filter
  filterNode = actx.createBiquadFilter();
  filterNode.type = 'lowpass';
  filterNode.frequency.value = 320;
  filterNode.Q.value = 2.8;

  // tremolo
  tremoloLFO = actx.createOscillator();
  tremoloLFO.type = 'sine';
  tremoloLFO.frequency.value = 0.9;
  tremoloGain = actx.createGain();
  tremoloGain.gain.value = 0.08;
  tremoloLFO.connect(tremoloGain);
  tremoloCarrier = actx.createGain();
  tremoloCarrier.gain.value = 0.92;
  tremoloGain.connect(tremoloCarrier.gain);

  // main oscillators
  osc1 = actx.createOscillator(); osc1.type = 'sawtooth'; osc1.frequency.value = 55;
  osc2 = actx.createOscillator(); osc2.type = 'sawtooth'; osc2.frequency.value = 82.5; osc2.detune.value = 7;
  osc3 = actx.createOscillator(); osc3.type = 'sine';     osc3.frequency.value = 27.5;
  var oscMix = actx.createGain(); oscMix.gain.value = 0.38;
  osc1.connect(oscMix); osc2.connect(oscMix); osc3.connect(oscMix);
  oscMix.connect(filterNode);
  filterNode.connect(tremoloCarrier);
  dryGain    = actx.createGain(); dryGain.gain.value    = 0.72;
  reverbGain = actx.createGain(); reverbGain.gain.value = 0.28;
  tremoloCarrier.connect(dryGain);
  tremoloCarrier.connect(convolver);
  convolver.connect(reverbGain);
  masterGain = actx.createGain(); masterGain.gain.value = 0.0;
  dryGain.connect(masterGain);
  reverbGain.connect(masterGain);
  masterGain.connect(actx.destination);
  masterGain.gain.linearRampToValueAtTime(0.72, actx.currentTime + 2.0);

  // kick bus
  kickOut = actx.createGain(); kickOut.gain.value = 1.0;
  kickOut.connect(actx.destination);

  // line drone — two detuned sines + bandpass-filtered white noise
  lineOsc1 = actx.createOscillator(); lineOsc1.type = 'sine'; lineOsc1.frequency.value = 110;
  lineOsc2 = actx.createOscillator(); lineOsc2.type = 'sine'; lineOsc2.frequency.value = 112;

  // White noise via AudioBuffer filled with random samples
  var noiseLen = actx.sampleRate * 2; // 2s looping buffer
  var noiseBuf = actx.createBuffer(1, noiseLen, actx.sampleRate);
  var nd = noiseBuf.getChannelData(0);
  for (var ni = 0; ni < noiseLen; ni++) nd[ni] = Math.random() * 2 - 1;
  var noiseNode = actx.createBufferSource();
  noiseNode.buffer = noiseBuf;
  noiseNode.loop = true;

  // Bandpass filter to colour the noise — centred around the drone pitch
  var noiseBP = actx.createBiquadFilter();
  noiseBP.type = 'bandpass';
  noiseBP.frequency.value = 300;
  noiseBP.Q.value = 1.8; // moderate width — airy, not too narrow
  noiseNode.connect(noiseBP);

  var noiseGain = actx.createGain();
  noiseGain.gain.value = 0.65; // noise sits under the sines

  noiseBP.connect(noiseGain);

  var lineMix = actx.createGain(); lineMix.gain.value = 0.9;
  lineOsc1.connect(lineMix);
  lineOsc2.connect(lineMix);
  noiseGain.connect(lineMix); // noise mixed in with the sines

  lineGain = actx.createGain(); lineGain.gain.value = 0.0;
  lineMix.connect(lineGain);
  // Dry path
  lineGain.connect(masterGain);
  // Wet path — through the existing convolver for a long spatial tail
  var lineRevGain = actx.createGain(); lineRevGain.gain.value = 0.55;
  lineGain.connect(lineRevGain);
  lineRevGain.connect(convolver);

  // Store noiseBP so updateLineDrone can track its frequency with the pitch
  window._noiseBP = noiseBP;

  // ceiling drone — higher pitch, separate gain driven by ceiling curve pixels
  ceilOsc1 = actx.createOscillator(); ceilOsc1.type = 'sine'; ceilOsc1.frequency.value = 220;
  ceilOsc2 = actx.createOscillator(); ceilOsc2.type = 'sine'; ceilOsc2.frequency.value = 222;

  // Ceiling gets its own noise colouring — higher bandpass than floor
  var ceilNoiseBuf = actx.createBuffer(1, noiseLen, actx.sampleRate);
  var cnd = ceilNoiseBuf.getChannelData(0);
  for (var ci = 0; ci < noiseLen; ci++) cnd[ci] = Math.random() * 2 - 1;
  var ceilNoiseNode = actx.createBufferSource();
  ceilNoiseNode.buffer = ceilNoiseBuf;
  ceilNoiseNode.loop = true;
  ceilBP = actx.createBiquadFilter();
  ceilBP.type = 'bandpass';
  ceilBP.frequency.value = 440;
  ceilBP.Q.value = 1.4;
  ceilNoiseNode.connect(ceilBP);
  var ceilNoiseGain = actx.createGain(); ceilNoiseGain.gain.value = 0.65;
  ceilBP.connect(ceilNoiseGain);

  var ceilMix = actx.createGain(); ceilMix.gain.value = 0.9;
  ceilOsc1.connect(ceilMix); ceilOsc2.connect(ceilMix);
  ceilNoiseGain.connect(ceilMix);

  // Flanger: LFO-modulated delay (2–8ms) mixed back with dry
  var flangerDelay = actx.createDelay(0.02);
  flangerDelay.delayTime.value = 0.005;
  var flangerFeedback = actx.createGain(); flangerFeedback.gain.value = 0.3;
  var flangerWet = actx.createGain(); flangerWet.gain.value = 0.25;
  var flangerLFO = actx.createOscillator(); flangerLFO.type = 'sine'; flangerLFO.frequency.value = 0.25;
  var flangerDepth = actx.createGain(); flangerDepth.gain.value = 0.0015; // ±3ms sweep
  flangerLFO.connect(flangerDepth);
  flangerDepth.connect(flangerDelay.delayTime);
  ceilMix.connect(flangerDelay);
  flangerDelay.connect(flangerFeedback);
  flangerFeedback.connect(flangerDelay); // feedback loop
  flangerDelay.connect(flangerWet);
  flangerLFO.start();

  // Dry + wet summed into ceilGain
  ceilGain = actx.createGain(); ceilGain.gain.value = 0.0;
  ceilMix.connect(ceilGain);    // dry
  flangerWet.connect(ceilGain); // wet (flanged)
  ceilGain.connect(masterGain);
  // Reverb send for ceiling drone
  var ceilRevGain = actx.createGain(); ceilRevGain.gain.value = 0.55;
  ceilGain.connect(ceilRevGain);
  ceilRevGain.connect(convolver);

  osc1.start(); osc2.start(); osc3.start();
  tremoloLFO.start(); lineOsc1.start(); lineOsc2.start(); noiseNode.start();
  ceilOsc1.start(); ceilOsc2.start(); ceilNoiseNode.start();
}

// ── main drone update ─────────────────────────────────────────────────────────
function updateAudio(camTime, spd) {
  if (!audioReady) return;
  var now = actx.currentTime;
  var tau = 0.12;
  var absSpd = Math.abs(spd);
  filterNode.frequency.setTargetAtTime(80 + absSpd * 46, now, tau);
  var pm = 1.0 + spd * 0.008;
  osc1.frequency.setTargetAtTime(55   * pm, now, tau);
  osc2.frequency.setTargetAtTime(82.5 * pm, now, tau);
  osc3.frequency.setTargetAtTime(27.5 * pm, now, tau);
  var swayAmt = Math.abs(Math.cos(camTime * 0.089));
  tremoloLFO.frequency.setTargetAtTime(0.4 + swayAmt * 1.8, now, tau * 2);
  var wet = 0.18 + (1 - Math.min(absSpd / 12, 1)) * 0.38;
  reverbGain.gain.setTargetAtTime(wet, now, tau);
  dryGain.gain.setTargetAtTime(1.0 - wet * 0.5, now, tau);
  var det = spd < 0 ? spd * 8 : 0;
  osc1.detune.setTargetAtTime(det,       now, tau);
  osc3.detune.setTargetAtTime(det * 1.3, now, tau);
}

// ── line drone — volume tracks actual curved-line pixel coverage ─────────────
// After each draw call we read 3 horizontal strips from the floor region.
// Pixels belonging to bright curved lines are noticeably brighter than the
// dark tile fill (~8 vs ~50+ out of 255). We count bright pixels and
// normalise to 0..1 to drive the drone gain.
function updateLineDrone(camTime, spd) {
  if (!audioReady || !lineGain || !pixelBuf) return;
  var now = actx.currentTime;

  // Sample deep in the floor — well below the wall bottom edge (~15% from bottom).
  // The wall slice occupies the centre; the actual floor is near the screen edges.
  var y0 = Math.floor(RH * 0.05);
  var y1 = Math.floor(RH * 0.10);
  var y2 = Math.floor(RH * 0.16);
  gl.readPixels(0, y0, RW, 1, gl.RGBA, gl.UNSIGNED_BYTE, pixelBuf, 0);
  gl.readPixels(0, y1, RW, 1, gl.RGBA, gl.UNSIGNED_BYTE, pixelBuf, RW * 4);
  gl.readPixels(0, y2, RW, 1, gl.RGBA, gl.UNSIGNED_BYTE, pixelBuf, RW * 8);

  // Count pixels brighter than the dark tile threshold
  // Dark tile ≈ 5–18 (out of 255). Grid/curve lines ≈ 40–120.
  var threshold = 35; // only catch bright curve lines, not dim tile grid
  var bright = 0;
  var total  = RW * 3;
  for (var i = 0; i < total; i++) {
    if (pixelBuf[i * 4] > threshold) bright++;
  }

  // Fraction of bright pixels, scaled up — curves rarely cover >30% of floor
  var intensity = Math.min(1.0, bright / total / 0.08);

  lineGain.gain.setTargetAtTime(intensity * 0.9, now, 0.2);

  var absSpd = Math.abs(spd);
  var freq   = 110 + absSpd * 4 + Math.sin(camTime * 0.19) * 8;
  lineOsc1.frequency.setTargetAtTime(freq,          now, 0.4);
  lineOsc2.frequency.setTargetAtTime(freq * 1.008,  now, 0.4);
  if (window._noiseBP) window._noiseBP.frequency.setTargetAtTime(freq * 0.9, now, 0.5);

  // ── ceiling strip — 3 rows from 55%–75% up from bottom (top of screen) ────
  var c0 = Math.floor(RH * 0.84);
  var c1 = Math.floor(RH * 0.90);
  var c2 = Math.floor(RH * 0.95);
  gl.readPixels(0, c0, RW, 1, gl.RGBA, gl.UNSIGNED_BYTE, pixelBuf, RW * 12);
  gl.readPixels(0, c1, RW, 1, gl.RGBA, gl.UNSIGNED_BYTE, pixelBuf, RW * 16);
  gl.readPixels(0, c2, RW, 1, gl.RGBA, gl.UNSIGNED_BYTE, pixelBuf, RW * 20);

  var cBright = 0;
  for (var ci2 = RW * 3; ci2 < RW * 6; ci2++) {
    if (pixelBuf[ci2 * 4] > threshold) cBright++;
  }
  var cIntensity = Math.min(1.0, cBright / total / 0.15);

  if (ceilGain) {
    ceilGain.gain.setTargetAtTime(cIntensity * 0.7, now, 0.2);
    // Ceiling drone pitched higher — rises more with speed
    var cFreq = 220 + absSpd * 5 + Math.cos(camTime * 0.23) * 10;
    ceilOsc1.frequency.setTargetAtTime(cFreq,          now, 0.4);
    ceilOsc2.frequency.setTargetAtTime(cFreq * 1.007,  now, 0.4);
    if (ceilBP) ceilBP.frequency.setTargetAtTime(cFreq * 0.85, now, 0.5);
  }
}


// ── kick ──────────────────────────────────────────────────────────────────────
function makeThump(when, startP, endP, pDecay, peak, tail) {
  var o = actx.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(Math.max(startP, 1), when);
  o.frequency.exponentialRampToValueAtTime(Math.max(endP, 1), when + pDecay);
  var env = actx.createGain();
  env.gain.setValueAtTime(0.0001, when);
  env.gain.linearRampToValueAtTime(peak, when + 0.006);
  env.gain.exponentialRampToValueAtTime(0.0001, when + tail);
  o.connect(env); env.connect(kickOut);
  o.start(when); o.stop(when + tail + 0.1);
}

function fireKick(spd) {
  var now    = actx.currentTime + 0.02; // small lookahead prevents past-scheduling
  var absSpd = Math.abs(spd);
  var rev    = spd < 0;
  var slow   = 1 - Math.min(absSpd / 12, 1);
  var sub    = 52 + absSpd * 2;
  var pDec   = 0.055 + slow * 0.03;
  var vel    = 0.3 + Math.random() * 0.7;
  var peak   = (0.62 + absSpd * 0.012) * vel;
  var tail   = 0.22 + slow * 0.18;
  var startP = sub * (rev ? 2.2 : 2.8);
  var endP   = rev ? sub * 1.35 : sub;
  makeThump(now, startP, endP, pDec, peak, tail * (rev ? 0.65 : 1.0));
}

function checkTileCrossing(camTime, spd) {
  if (!audioReady) return;
  var tileIdx = Math.floor(camTime / TILE_JS);
  var delta   = tileIdx - lastTileIdx;
  if (Math.abs(delta) >= 1) {
    lastTileIdx = tileIdx;
    kickCount++;
    if (kickCount % 2 === 0) fireKick(spd);
  }
}

// ── render loop ───────────────────────────────────────────────────────────────
var lastTs  = null;
var camTime = 0;

function frame(ts) {
  if (!lastTs) lastTs = ts;
  var dt = (ts - lastTs) * 0.001;
  lastTs = ts;
  camTime += speed * dt;

  gl.uniform2f(locRes,  RW, RH);
  gl.uniform1f(locTime, camTime);
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  updateAudio(camTime, speed);
  updateLineDrone(camTime, speed);
  checkTileCrossing(camTime, speed);

  requestAnimationFrame(frame);
}

// ── entry ─────────────────────────────────────────────────────────────────────
startEl.addEventListener('click', function() {
  initAudio();
  startEl.style.transition = 'opacity .8s';
  startEl.style.opacity    = '0';
  setTimeout(function() { startEl.remove(); }, 900);
  requestAnimationFrame(frame);
}, { once: true });
</script>
</body>
</html>
