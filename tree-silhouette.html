<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albero che Cresce</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a1610; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; position: absolute; top: 0; left: 0; touch-action: none; }
  #hint {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.28); font-size: 12px; letter-spacing: 0.35em;
    text-transform: uppercase; pointer-events: none; font-family: Georgia, serif;
    transition: opacity 1s;
  }
  #restart {
    position: fixed; top: 28px; right: 32px; background: none;
    border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.35);
    font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
    padding: 8px 18px; cursor: pointer; transition: all 0.3s; font-family: Georgia, serif;
  }
  #restart:hover { border-color: rgba(255,255,255,0.5); color: rgba(255,255,255,0.8); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">Disegna la direzione del tronco</div>
<button id="restart">&#8635; Pulisci</button>
<script>
(function() {
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var hint = document.getElementById('hint');
  var trees = [], fireflies = [], globalStart = null;
  var state = 'waiting', gesture = [];
  var TOTAL = 14;

  function rand(a, b) { return a + Math.random() * (b - a); }
  function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
  function lerp(a, b, t) { return a + (b-a)*t; }

  // ── Tree builder ──────────────────────────────────────────────────────────
  function buildTree(pts) {
    var branches = [], leaves = [];
    if (pts.length < 2) return null;

    // Measure gesture length
    var totalLen = 0;
    for (var i = 1; i < pts.length; i++) {
      var dx = pts[i].x-pts[i-1].x, dy = pts[i].y-pts[i-1].y;
      totalLen += Math.sqrt(dx*dx+dy*dy);
    }
    if (totalLen < 15) return null;

    // Resample into trunk spine points
    var N = 8;
    var sampled = [pts[0]], acc = 0, step = totalLen/N;
    for (var i = 1; i < pts.length; i++) {
      var dx = pts[i].x-pts[i-1].x, dy = pts[i].y-pts[i-1].y;
      var seg = Math.sqrt(dx*dx+dy*dy);
      acc += seg;
      while (acc >= step && sampled.length < N) {
        var t = 1-(acc-step)/seg;
        sampled.push({x:pts[i-1].x+dx*t, y:pts[i-1].y+dy*t});
        acc -= step;
      }
    }
    sampled.push(pts[pts.length-1]);

    var rootY = sampled[0].y;
    var lf = Math.min(1, totalLen/(canvas.height*0.6));

    // Tree personality
    var spread  = rand(0.45, 0.75);
    var ratio   = rand(0.55, 0.68);
    var depth   = Math.floor(rand(5,7) + lf*2);
    var asym    = rand(-0.1, 0.1);

    // Trunk tilt for light correction
    var tip = sampled[sampled.length-1], root0 = sampled[0];
    var tilt = Math.atan2(tip.y-root0.y, tip.x-root0.x) - (-Math.PI/2);

    // Build trunk as connected segments
    var delay = 0, pid = -1;
    for (var s = 0; s < sampled.length-1; s++) {
      var x1=sampled[s].x, y1=sampled[s].y, x2=sampled[s+1].x, y2=sampled[s+1].y;
      var slen = Math.sqrt((x2-x1)*(x2-x1)+(y2-y1)*(y2-y1));
      var dur = 0.035 + rand(0,0.02);
      var w = Math.max(2.5, (sampled.length-s)*0.9);
      var idx = branches.length;
      branches.push({x1:x1,y1:y1,x2:x2,y2:y2,w:w,delay:delay,dur:dur,pid:pid,curve:rand(-0.2,0.2)});
      delay += dur;
      pid = idx;

      // Sprout from every segment except the first
      if (s >= 1) {
        var ang = Math.atan2(y2-y1, x2-x1);
        // Always left AND right
        grow(x2,y2, ang+rand(0.45,0.85),  slen*rand(0.7,1.1), depth-1, delay, idx, w*0.55);
        grow(x2,y2, ang-rand(0.45,0.85),  slen*rand(0.7,1.1), depth-1, delay, idx, w*0.55);
        // Sometimes a third central one
        if (Math.random()<0.4)
          grow(x2,y2, ang+rand(-0.2,0.2), slen*rand(0.5,0.8), depth-2, delay, idx, w*0.45);
      }
    }

    // Crown fork at tip
    var last = sampled[sampled.length-1], prev = sampled[sampled.length-2];
    var tipAng = Math.atan2(last.y-prev.y, last.x-prev.x);
    var tipLen = Math.sqrt((last.x-prev.x)*(last.x-prev.x)+(last.y-prev.y)*(last.y-prev.y));
    var tipW = Math.max(2, 1.5);
    grow(last.x,last.y, tipAng-rand(0.2,0.5), tipLen*rand(0.5,0.8), depth, delay, pid, tipW);
    grow(last.x,last.y, tipAng+rand(0.2,0.5), tipLen*rand(0.5,0.8), depth, delay, pid, tipW);
    grow(last.x,last.y, tipAng+rand(-0.1,0.1),tipLen*rand(0.4,0.65),depth-1, delay, pid, tipW*0.8);

    function grow(x1,y1,angle,len,dep,del,par,maxW) {
      if (dep<0 || len<3) return;
      var x2=x1+Math.cos(angle)*len, y2=y1+Math.sin(angle)*len;
      var dur=0.04+rand(0,0.03);
      var w=Math.min(maxW, Math.max(1, dep*0.7+0.8));
      var idx=branches.length;
      branches.push({x1:x1,y1:y1,x2:x2,y2:y2,w:w,delay:del,dur:dur,pid:par,curve:rand(-0.9,0.9)});

      if (dep===0) {
        for (var k=0;k<Math.floor(rand(3,7));k++)
          leaves.push({x:x2+rand(-10,10),y:y2+rand(-10,10),r:rand(1.5,3.5),delay:del+dur+rand(0,0.25)});
      } else {
        var cor = -tilt*0.2*(dep/depth);
        var cd  = del+dur+rand(0,0.01);
        var sp  = spread+rand(-0.08,0.08);
        var n   = dep>=3 ? (Math.random()<0.5?3:2) : 2;
        if (Math.random()<0.15) n++;
        for (var i=0;i<n;i++) {
          var side = n===1?0 : (i===0?-sp : i===n-1?sp : rand(-sp*0.4,sp*0.4));
          var droop= (i===n-1&&Math.random()<0.22)?rand(0.3,0.65):0;
          var off  = side+cor+asym*rand(0.4,1)+rand(-0.07,0.07)+droop;
          grow(x2,y2,angle+off,len*(ratio+rand(-0.05,0.05)),dep-1,cd+i*0.01,idx,w*0.72);
        }
      }
    }

    var depthT = rootY/canvas.height;
    return {
      branches:branches, leaves:leaves, rootY:rootY, startNow:null,
      r:Math.round(lerp(28,5,depthT)),
      g:Math.round(lerp(45,12,depthT)),
      b:Math.round(lerp(30,7,depthT))
    };
  }

  function initFireflies() {
    fireflies=[];
    for (var i=0;i<9;i++)
      fireflies.push({x:rand(50,canvas.width-50),y:rand(50,canvas.height-50),
        vx:rand(-0.25,0.25),vy:rand(-0.2,0.2),phase:rand(0,Math.PI*2),speed:rand(0.7,1.8)});
  }

  function drawBg(el) {
    var W=canvas.width,H=canvas.height;
    var g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0a2214'); g.addColorStop(1,'#111a14');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    var mt=Math.min(1,Math.max(0,(el||0)-1)/4);
    if (mt>0) {
      var mx=W*0.65,my=H*0.2,mr=H*0.11;
      var grd=ctx.createRadialGradient(mx,my,0,mx,my,mr*2.5);
      grd.addColorStop(0,'rgba(140,200,150,'+(0.12*ease(mt)).toFixed(3)+')');
      grd.addColorStop(1,'rgba(140,200,150,0)');
      ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(mx,my,mr*2.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(180,220,170,'+(0.15*ease(mt)).toFixed(3)+')';
      ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2); ctx.fill();
    }
  }

  function renderTree(tree,now) {
    if (!tree.startNow) tree.startNow=now;
    var T=Math.min((now-tree.startNow)/1000/TOTAL,1);
    var W=canvas.width,H=canvas.height;
    var r0=tree.r,g0=tree.g,b0=tree.b;

    // Ground
    var gnd=ctx.createLinearGradient(0,tree.rootY,0,H);
    gnd.addColorStop(0,'rgba('+r0+','+g0+','+b0+',0.82)');
    gnd.addColorStop(0.2,'rgba('+r0+','+g0+','+b0+',0.97)');
    gnd.addColorStop(1,'rgba('+Math.max(0,r0-3)+','+Math.max(0,g0-4)+','+Math.max(0,b0-2)+',1)');
    ctx.fillStyle=gnd; ctx.fillRect(0,tree.rootY,W,H-tree.rootY);

    // Branches
    ctx.lineCap='round'; ctx.lineJoin='round';
    var br=Math.max(0,r0-28),bg=Math.max(0,g0-40),bb=Math.max(0,b0-28);
    for (var i=0;i<tree.branches.length;i++) {
      var b=tree.branches[i];
      var lt=Math.max(0,Math.min(1,(T-b.delay)/b.dur));
      if (lt<=0) continue;
      var e=ease(lt);
      var sx=b.x1,sy=b.y1;
      if (b.pid>=0) {
        var p=tree.branches[b.pid];
        var pe=ease(Math.max(0,Math.min(1,(T-p.delay)/p.dur)));
        sx=lerp(p.x1,p.x2,pe); sy=lerp(p.y1,p.y2,pe);
      }
      var ex=lerp(sx,b.x2,e),ey=lerp(sy,b.y2,e);
      var cmx=(sx+ex)/2+b.curve*(ey-sy)*0.18;
      var cmy=(sy+ey)/2-b.curve*(ex-sx)*0.18;
      ctx.beginPath(); ctx.moveTo(sx,sy);
      ctx.quadraticCurveTo(cmx,cmy,ex,ey);
      ctx.strokeStyle='rgb('+br+','+bg+','+bb+')';
      ctx.lineWidth=b.w; ctx.stroke();
    }

    // Leaves
    for (var j=0;j<tree.leaves.length;j++) {
      var lf=tree.leaves[j];
      var lt2=Math.max(0,Math.min(1,(T-lf.delay)/0.25));
      if (lt2<=0) continue;
      ctx.beginPath(); ctx.arc(lf.x,lf.y,lf.r,0,Math.PI*2);
      ctx.fillStyle='rgba(90,130,80,'+(ease(lt2)*0.65).toFixed(3)+')'; ctx.fill();
    }
  }

  function render(now) {
    if (!globalStart) globalStart=now;
    var el=(now-globalStart)/1000;
    var W=canvas.width,H=canvas.height;
    ctx.clearRect(0,0,W,H);
    drawBg(trees.length>0?el:0);

    if (state==='drawing' && gesture.length>1) {
      ctx.save(); ctx.strokeStyle='rgba(255,255,255,0.18)';
      ctx.lineWidth=1; ctx.setLineDash([4,6]); ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(gesture[0].x,gesture[0].y);
      for (var i=1;i<gesture.length;i++) ctx.lineTo(gesture[i].x,gesture[i].y);
      ctx.stroke(); ctx.restore();
    }

    var sorted=trees.slice().sort(function(a,b){return a.rootY-b.rootY;});
    for (var t=0;t<sorted.length;t++) renderTree(sorted[t],now);

    if (trees.length>0) {
      var fft=Math.max(0,el-4);
      if (fft>0) for (var f=0;f<fireflies.length;f++) {
        var ff=fireflies[f];
        ff.x+=ff.vx*0.4+Math.sin(el*ff.speed+ff.phase)*0.3;
        ff.y+=ff.vy*0.4+Math.cos(el*ff.speed*0.7+ff.phase)*0.2;
        if (ff.x<0) ff.x=W; if (ff.x>W) ff.x=0;
        if (ff.y<0) ff.y=H; if (ff.y>H) ff.y=0;
        var blink=Math.max(0,Math.sin(el*ff.speed*1.5+ff.phase));
        var al=((0.4+0.6*blink)*Math.min(1,fft/3)).toFixed(3);
        if (al<0.05) continue;
        var grd2=ctx.createRadialGradient(ff.x,ff.y,0,ff.x,ff.y,4);
        grd2.addColorStop(0,'rgba(200,255,180,'+al+')');
        grd2.addColorStop(1,'rgba(200,255,180,0)');
        ctx.fillStyle=grd2; ctx.beginPath(); ctx.arc(ff.x,ff.y,4,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(230,255,210,'+al+')';
        ctx.beginPath(); ctx.arc(ff.x,ff.y,1,0,Math.PI*2); ctx.fill();
      }
    }

    if (state==='waiting'&&trees.length===0) hint.style.opacity='1';
    requestAnimationFrame(render);
  }

  function getPos(e) {
    var r=canvas.getBoundingClientRect(), s=e.touches?e.touches[0]:e;
    return {x:s.clientX-r.left, y:s.clientY-r.top};
  }
  function onStart(e) { e.preventDefault(); state='drawing'; gesture=[getPos(e)]; hint.style.opacity='0'; }
  function onMove(e)  { if (state!=='drawing') return; e.preventDefault(); gesture.push(getPos(e)); }
  function onEnd(e)   {
    if (state!=='drawing') return; e.preventDefault();
    if (gesture.length<2) { state='waiting'; return; }
    var tree=buildTree(gesture);
    if (tree) trees.push(tree);
    gesture=[]; state='growing';
  }

  canvas.addEventListener('mousedown', onStart);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup',   onEnd);
  canvas.addEventListener('touchstart',onStart,{passive:false});
  canvas.addEventListener('touchmove', onMove, {passive:false});
  canvas.addEventListener('touchend',  onEnd,  {passive:false});

  document.getElementById('restart').addEventListener('click',function(){
    trees=[]; gesture=[]; globalStart=null; state='waiting'; hint.style.opacity='1';
  });
  window.addEventListener('resize',function(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  initFireflies();
  requestAnimationFrame(render);
})();
</script>
</body>
</html>
